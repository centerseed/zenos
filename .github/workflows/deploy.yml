name: Deploy

# Only runs on main push, after CI passes.
# Deploys only the components whose files actually changed.

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - "docs/customers.yml"
      - "firestore.rules"
      - "firestore.indexes.json"
      # MCP Server deploy (Cloud Run) is manual via ./scripts/deploy_mcp.sh —
      # uncomment when GCP service account is configured:
      # - "src/**"
      # - "Dockerfile"

jobs:
  # Gate: CI must pass first
  ci:
    uses: ./.github/workflows/ci.yml

  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      dashboard: ${{ steps.changes.outputs.dashboard }}
      firestore: ${{ steps.changes.outputs.firestore }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed paths
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          if echo "$CHANGED" | grep -qE '^dashboard/|^docs/customers\.yml$'; then
            echo "dashboard=true" >> "$GITHUB_OUTPUT"
          else
            echo "dashboard=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED" | grep -qE '^firestore\.(rules|indexes\.json)$'; then
            echo "firestore=true" >> "$GITHUB_OUTPUT"
          else
            echo "firestore=false" >> "$GITHUB_OUTPUT"
          fi

  load-customers:
    name: Load Customers
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      customers: ${{ steps.matrix.outputs.customers }}
    steps:
      - uses: actions/checkout@v4

      - name: Load customer matrix
        id: matrix
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          def strip_quotes(value: str) -> str:
              if len(value) >= 2 and value[0] == value[-1] and value[0] in {"'", '"'}:
                  return value[1:-1]
              return value

          customers = []
          current = None
          for raw_line in Path("docs/customers.yml").read_text(encoding="utf-8").splitlines():
              line = raw_line.split("#", 1)[0].rstrip()
              if not line.strip():
                  continue
              stripped = line.strip()
              if stripped == "customers:":
                  continue
              if stripped.startswith("- "):
                  if current:
                      customers.append(current)
                  current = {}
                  stripped = stripped[2:].strip()
                  if stripped:
                      key, value = [part.strip() for part in stripped.split(":", 1)]
                      current[key] = strip_quotes(value)
                  continue
              if current is None or ":" not in stripped:
                  raise SystemExit(f"Unsupported docs/customers.yml line: {raw_line}")
              key, value = [part.strip() for part in stripped.split(":", 1)]
              current[key] = strip_quotes(value)

          if current:
              customers.append(current)

          required = {"id", "project", "hosting_url"}
          if not customers:
              raise SystemExit("docs/customers.yml does not define any customers")

          for customer in customers:
              missing = sorted(required - customer.keys())
              if missing:
                  raise SystemExit(
                      f"Customer entry {customer!r} is missing required keys: {', '.join(missing)}"
                  )

          payload = json.dumps(customers, separators=(",", ":"))
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"customers={payload}\n")

          print(payload)
          PY

  deploy-dashboard:
    name: Deploy Dashboard (${{ matrix.customer.id }})
    runs-on: ubuntu-latest
    needs: [detect-changes, load-customers]
    if: needs.detect-changes.outputs.dashboard == 'true'
    strategy:
      fail-fast: false
      matrix:
        customer: ${{ fromJson(needs.load-customers.outputs.customers) }}
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate dashboard public env
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_MCP_API_URL: ${{ secrets.NEXT_PUBLIC_MCP_API_URL }}
        run: |
          for name in \
            NEXT_PUBLIC_FIREBASE_API_KEY \
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN \
            NEXT_PUBLIC_FIREBASE_PROJECT_ID \
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET \
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID \
            NEXT_PUBLIC_FIREBASE_APP_ID
          do
            if [ -z "${!name}" ]; then
              echo "Missing required dashboard build env: $name"
              exit 1
            fi
          done

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_MCP_API_URL: ${{ secrets.NEXT_PUBLIC_MCP_API_URL }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Smoke test built dashboard
        run: npx playwright test playwright/smoke.spec.ts
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_MCP_API_URL: ${{ secrets.NEXT_PUBLIC_MCP_API_URL }}

      - name: Deploy via script
        run: ./scripts/deploy.sh --project "${{ matrix.customer.project }}" --hosting-url "${{ matrix.customer.hosting_url }}" --skip-tests
        working-directory: .
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

  deploy-firestore:
    name: Deploy Firestore Rules
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.firestore == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Firestore rules + indexes
        run: npx firebase-tools deploy --only firestore --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
